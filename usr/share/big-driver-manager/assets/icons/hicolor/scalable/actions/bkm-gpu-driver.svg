<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Outer glow ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#26a269" stroke-width="1" opacity="0.15"/>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="18" fill="#26a269" opacity="0.08"/>
  <!-- GPU chip outline (subtle) -->
  <rect x="14" y="14" width="20" height="20" rx="2.5"
        fill="#26a269" fill-opacity="0.12" stroke="#26a269" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Chip pins (subtle) -->
  <line x1="19" y1="11" x2="19" y2="14" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="24" y1="11" x2="24" y2="14" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="29" y1="11" x2="29" y2="14" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="19" y1="34" x2="19" y2="37" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="24" y1="34" x2="24" y2="37" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="29" y1="34" x2="29" y2="37" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="11" y1="19" x2="14" y2="19" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="11" y1="24" x2="14" y2="24" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="11" y1="29" x2="14" y2="29" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="34" y1="19" x2="37" y2="19" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="34" y1="24" x2="37" y2="24" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="34" y1="29" x2="37" y2="29" stroke="#26a269" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <!-- SHARP: GPU card body -->
  <rect x="17" y="17" width="14" height="14" rx="2" fill="#26a269" opacity="0.85"/>
  <!-- SHARP: Die core highlight -->
  <rect x="20" y="20" width="8" height="8" rx="1" fill="#33d17a"/>
  <!-- SHARP: PCIe traces on die -->
  <line x1="21" y1="22" x2="27" y2="22" stroke="#1a5fb4" stroke-width="1" stroke-linecap="round"/>
  <line x1="21" y1="24" x2="27" y2="24" stroke="#1a5fb4" stroke-width="1" stroke-linecap="round"/>
  <line x1="21" y1="26" x2="27" y2="26" stroke="#1a5fb4" stroke-width="1" stroke-linecap="round"/>
  <!-- Accent dot -->
  <circle cx="36" cy="12" r="2.5" fill="#26a269" opacity="0.35"/>
  <circle cx="36" cy="12" r="1" fill="#33d17a" opacity="0.8"/>
</svg>
