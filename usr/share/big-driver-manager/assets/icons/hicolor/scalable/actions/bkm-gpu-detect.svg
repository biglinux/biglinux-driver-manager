<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Monitor with GPU info — hardware detection icon -->
  <!-- Monitor body -->
  <rect x="2" y="3" width="28" height="20" rx="2.5" fill="#241f31"/>
  <!-- Screen -->
  <rect x="4" y="5" width="24" height="16" rx="1.5" fill="#1a5fb4"/>
  <!-- Screen content: GPU info lines -->
  <line x1="7" y1="9" x2="18" y2="9" stroke="#99c1f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="13" x2="22" y2="13" stroke="#99c1f1" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="7" y1="17" x2="15" y2="17" stroke="#99c1f1" stroke-width="1.3" stroke-linecap="round" opacity="0.4"/>
  <!-- Checkmark on screen -->
  <polyline points="20,15 22,17.5 25,13" fill="none" stroke="#33d17a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stand -->
  <rect x="12" y="23" width="8" height="2" rx="0.5" fill="#504e55"/>
  <!-- Base -->
  <rect x="9" y="25" width="14" height="2.5" rx="1" fill="#504e55"/>
</svg>
