  <circle cx="24" cy="24" r="18" fill="#2ec27e" opacity="0.08"/>
  <!-- Container card (subtle) -->
  <rect x="10" y="10" width="28" height="28" rx="3.5"
        fill="#2ec27e" fill-opacity="0.08" stroke="#2ec27e" stroke-width="1" stroke-opacity="0.18"/>
  <!-- SHARP: Grid frame -->
  <rect x="14" y="14" width="20" height="20" rx="2"
        fill="#2ec27e" fill-opacity="0.15" stroke="#2ec27e" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- SHARP: Processing cores (2x2) -->
  <rect x="16" y="16" width="7" height="7" rx="1.2" fill="#2ec27e" opacity="0.8"/>
  <rect x="25" y="16" width="7" height="7" rx="1.2" fill="#2ec27e" opacity="0.65"/>
