  <rect x="25" y="25" width="7" height="7" rx="1.2" fill="#2ec27e" opacity="0.8"/>
  <!-- Connection dots -->
  <circle cx="24" cy="18" r="0.8" fill="#33d17a" opacity="0.6"/>
  <circle cx="24" cy="27" r="0.8" fill="#33d17a" opacity="0.6"/>
  <circle cx="18" cy="24" r="0.8" fill="#33d17a" opacity="0.6"/>
  <circle cx="27" cy="24" r="0.8" fill="#33d17a" opacity="0.6"/>
  <!-- Accent dot -->
