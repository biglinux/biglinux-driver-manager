<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" fill="none">
  <!-- Sound wave icon representing RT (Real-Time) kernel for audio -->
  <!-- Central line -->
  <line x1="30" y1="12" x2="30" y2="48" stroke="#a51d2d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wave lines -->
  <line x1="22" y1="18" x2="22" y2="42" stroke="#a51d2d" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="18" x2="38" y2="42" stroke="#a51d2d" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="14" y1="24" x2="14" y2="36" stroke="#a51d2d" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="46" y1="24" x2="46" y2="36" stroke="#a51d2d" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="8" y1="28" x2="8" y2="32" stroke="#a51d2d" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="52" y1="28" x2="52" y2="32" stroke="#a51d2d" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Clock hint (small) -->
  <circle cx="47" cy="47" r="8" fill="white" stroke="#a51d2d" stroke-width="1.5"/>
  <line x1="47" y1="43" x2="47" y2="47" stroke="#a51d2d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="47" x2="50" y2="49" stroke="#a51d2d" stroke-width="1.5" stroke-linecap="round"/>
</svg>
