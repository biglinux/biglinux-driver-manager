<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="18" fill="#3584e4" opacity="0.10"/>
  <!-- CPU/chip body -->
  <rect x="15" y="15" width="18" height="18" rx="3" ry="3"
        fill="#3584e4" opacity="0.18" stroke="#3584e4" stroke-width="1.2"/>
  <!-- Inner chip core -->
  <rect x="19" y="19" width="10" height="10" rx="2" ry="2"
        fill="#62a0ea" opacity="0.15"/>
  <!-- Chip pins top -->
  <line x1="20" y1="12" x2="20" y2="15" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="12" x2="24" y2="15" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="12" x2="28" y2="15" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chip pins bottom -->
  <line x1="20" y1="33" x2="20" y2="36" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="33" x2="24" y2="36" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="33" x2="28" y2="36" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chip pins left -->
  <line x1="12" y1="20" x2="15" y2="20" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="24" x2="15" y2="24" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="28" x2="15" y2="28" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chip pins right -->
  <line x1="33" y1="20" x2="36" y2="20" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="24" x2="36" y2="24" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="28" x2="36" y2="28" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pulse/heartbeat in center -->
  <polyline points="20,24 22,24 23,20 25,28 26,24 28,24" fill="none"
            stroke="#3584e4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
