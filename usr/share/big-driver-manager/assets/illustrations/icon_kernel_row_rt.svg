<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#e66100" opacity="0.10"/>
  <!-- Stopwatch body -->
  <circle cx="16" cy="18" r="8" fill="#e66100" opacity="0.15" stroke="#e66100" stroke-width="1"/>
  <!-- Top knob -->
  <rect x="15" y="8.5" width="2" height="2.5" rx="0.8" fill="#e66100" opacity="0.5"/>
  <line x1="16" y1="8.5" x2="16" y2="7" stroke="#e66100" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Clock hands (precise timing) -->
  <line x1="16" y1="18" x2="16" y2="14" stroke="#e66100" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="18" x2="19" y2="19.5" stroke="#e66100" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="18" r="0.9" fill="#e66100"/>
  <!-- Tick marks -->
  <line x1="16" y1="11" x2="16" y2="12" stroke="#e66100" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="23" y1="18" x2="22" y2="18" stroke="#e66100" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="25" x2="16" y2="24" stroke="#e66100" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="9" y1="18" x2="10" y2="18" stroke="#e66100" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
</svg>
