<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#1c71d8" opacity="0.08"/>
  <!-- Container card (subtle) -->
  <rect x="3" y="5" width="26" height="22" rx="3"
        fill="#1c71d8" fill-opacity="0.08" stroke="#1c71d8" stroke-width="0.6" stroke-opacity="0.15"/>
  <!-- SHARP: Monitor frame -->
  <rect x="6" y="7" width="20" height="13" rx="2"
        fill="#1c71d8" opacity="0.75" stroke="#1a5fb4" stroke-width="0.5"/>
  <!-- SHARP: Screen -->
  <rect x="8" y="9" width="16" height="9" rx="1" fill="#62a0ea" opacity="0.4"/>
  <!-- SHARP: Play triangle -->
  <polygon points="13.5,11 20,13.5 13.5,16" fill="white" opacity="0.9"/>
  <!-- SHARP: Stand -->
  <line x1="16" y1="20" x2="16" y2="23" stroke="#1c71d8" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="11.5" y1="23" x2="20.5" y2="23" stroke="#1c71d8" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
