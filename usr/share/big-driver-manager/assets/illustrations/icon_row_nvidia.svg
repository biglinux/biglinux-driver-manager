<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#26a269" opacity="0.08"/>
  <!-- GPU card outline (subtle) -->
  <rect x="5" y="9" width="22" height="13" rx="2"
        fill="#26a269" fill-opacity="0.10" stroke="#26a269" stroke-width="0.8" stroke-opacity="0.15"/>
  <!-- SHARP: GPU die -->
  <rect x="10" y="10.5" width="12" height="10" rx="1.5"
        fill="#26a269" opacity="0.75"/>
  <!-- SHARP: Die core highlight -->
  <rect x="12.5" y="13" width="7" height="5" rx="1"
        fill="#33d17a" opacity="0.9"/>
  <!-- SHARP: Traces on die -->
  <line x1="13.5" y1="14.5" x2="18.5" y2="14.5" stroke="#1a5fb4" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="13.5" y1="16.5" x2="18.5" y2="16.5" stroke="#1a5fb4" stroke-width="0.8" stroke-linecap="round"/>
  <!-- PCIe connector -->
  <line x1="10" y1="24" x2="22" y2="24" stroke="#26a269" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
</svg>
