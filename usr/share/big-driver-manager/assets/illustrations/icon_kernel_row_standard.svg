<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#3584e4" opacity="0.10"/>
  <!-- CPU chip body -->
  <rect x="10" y="10" width="12" height="12" rx="2" ry="2"
        fill="#3584e4" opacity="0.15" stroke="#3584e4" stroke-width="1"/>
  <!-- Inner core -->
  <rect x="13" y="13" width="6" height="6" rx="1" ry="1"
        fill="#3584e4" opacity="0.12"/>
  <!-- Pins -->
  <line x1="14" y1="8" x2="14" y2="10" stroke="#3584e4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="8" x2="18" y2="10" stroke="#3584e4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="22" x2="14" y2="24" stroke="#3584e4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="18" y2="24" stroke="#3584e4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="14" x2="10" y2="14" stroke="#3584e4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="18" x2="10" y2="18" stroke="#3584e4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="14" x2="24" y2="14" stroke="#3584e4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="18" x2="24" y2="18" stroke="#3584e4" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Up arrow (latest) -->
  <polyline points="14.5,17.5 16,15 17.5,17.5" fill="none" stroke="#3584e4" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
